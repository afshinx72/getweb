    <meta name="description" content="The official Reddit client for browsing Reddit on Windows.&#xD;&#xA;&#xD;&#xA;Reddit is the place where people come together to have the most authentic and interesting conversations on the internet&#x2014;Where gaming communities, nostalgic internet forums, bloggers, meme-makers, and fandoms mingle alongside video streamers, support groups, news junkies, armchair experts, seasoned professionals, and artists and creators of all types.&#xD;&#xA;&#xD;&#xA;&#xD;&#xA;With over 100,000 communities about every topic you could think of (and a few you&#x2019;d probably never think of if it wasn&#x2019;t for the creativity of strangers on the internet), Reddit is the place where you can dive into anything and connect with people on any topic.&#xD;&#xA;&#xD;&#xA;&#xD;&#xA;A few things you&#x2019;ll find on Reddit&#x2026;&#xD;&#xA;&#xD;&#xA;&#x25A0; Thousands of communities&#xD;&#xA;Whether you&#x27;re into breaking news, sports, TV fan theories, or a never-ending stream of the internet&#x27;s cutest animals, there&#x27;s a community on Reddit for you.&#xD;&#xA;&#xD;&#xA;&#x25A0; Laughs, lols, and plenty of ridiculousness&#xD;&#xA;Lose track of vast amounts of time as you find memes, bananas for scale, bread stapled to trees, cat videos, and more of the absurd and oddly absorbing.&#xD;&#xA;&#xD;&#xA;&#x25A0; The best discussions&#xD;&#xA;The real action is always in the comments. Reddit&#x2019;s discussion threads are where community members jump in to provide commentary, humor, and insight.&#xD;&#xA;&#xD;&#xA;&#x25A0; Answers to questions you&#x2019;re too afraid to ask in public&#xD;&#xA;Recipes, street fashion, career help, fitness plans, and more&#x2014;find ideas and inspiration for whatever you want to do.&#xD;&#xA;&#xD;&#xA;&#x25A0; Live video streams, chats, and talks&#xD;&#xA;Want to know what people are doing right now? Streaming videos, live chats, and live audio conversations give you a variety of ways to connect with people in the moment.&#xD;&#xA;&#xD;&#xA;&#x25A0; Crowd-sourced points of view on just about everything&#xD;&#xA;Product reviewers, music critics, sports fans, or doge enthusiasts&#x2014;find people that obsess and care about whatever it is you&#x2019;re interested in.&#xD;&#xA;&#xD;&#xA;&#x25A0; Anonymous profiles so you can do you&#xD;&#xA;On Reddit, you (not your job, number of friends, or social status) define who you are.&#xD;&#xA;&#xD;&#xA;&#x25A0; Lots and lots of cats &#xD;&#xA;&#xD;&#xA;Developer Note: This app does not support Windows 10 S.">

            {"@context":"https://schema.org","@type":"SoftwareApplication","name":"Reddit - Free download and install on Windows | Microsoft Store","description":"The official Reddit client for browsing Reddit on Windows.\r\n\r\nReddit is the place where people come together to have the most authentic and interesting conversations on the internet—Where gaming communities, nostalgic internet forums, bloggers, meme-makers, and fandoms mingle alongside video streamers, support groups, news junkies, armchair experts, seasoned professionals, and artists and creators of all types.\r\n\r\n\r\nWith over 100,000 communities about every topic you could think of (and a few you’d probably never think of if it wasn’t for the creativity of strangers on the internet), Reddit is the place where you can dive into anything and connect with people on any topic.\r\n\r\n\r\nA few things you’ll find on Reddit…\r\n\r\n■ Thousands of communities\r\nWhether you're into breaking news, sports, TV fan theories, or a never-ending stream of the internet's cutest animals, there's a community on Reddit for you.\r\n\r\n■ Laughs, lols, and plenty of ridiculousness\r\nLose track of vast amounts of time as you find memes, bananas for scale, bread stapled to trees, cat videos, and more of the absurd and oddly absorbing.\r\n\r\n■ The best discussions\r\nThe real action is always in the comments. Reddit’s discussion threads are where community members jump in to provide commentary, humor, and insight.\r\n\r\n■ Answers to questions you’re too afraid to ask in public\r\nRecipes, street fashion, career help, fitness plans, and more—find ideas and inspiration for whatever you want to do.\r\n\r\n■ Live video streams, chats, and talks\r\nWant to know what people are doing right now? Streaming videos, live chats, and live audio conversations give you a variety of ways to connect with people in the moment.\r\n\r\n■ Crowd-sourced points of view on just about everything\r\nProduct reviewers, music critics, sports popup Store, please re-generate the badge and use the new code.","BadgePage.Preview.Tab":"Preview","BadgePage.CodeSnippet.Tab":"Code Snippet","BadgePage.Optional.Text":"(Optional)","BadgePage.Interaction.Header":"Interaction Animation","BadgePage.Interaction.Tooltip":"The badge animation on hover and pressed states.","BadgePage.Language.Header":"Language","BadgePage.StaticLanguage.Tooltip":"Choose a language to render the badge in.","BadgePage.WebComponentLanguage.Tooltip":"Auto detect (recommended) renders the badge in the language of the user\u0027s browser. Alternately, choose a language to always render the badge in that language.","BadgePage.Launch.Header":"Launch Mode","BadgePage.Launch.Tooltip":"The launch mode for your app when users click on your badge. Direct mode downloads your app\u0027s installer executable and is the default. Full mode opens your app\u0027s product page on Store app.","BadgePage.WebComponent.Tab":"Web Component","BadgePage.TabAriaLabel":"{0} tab","BadgePage.TabSelectedAriaLabel":"Selected {0} tab","BadgePage.Theme.Header":"Theme","BadgePage.StaticTheme.Tooltip":"The badge theme to use. Guidance is to choose dark on light backgrounds and vise-versa.","BadgePage.WebComponentTheme.Tooltip":"Auto Detect will detect the user\u0027s theme and display the corresponding badge theme.","BadgePage.Title":"Build your app badge","BadgePage.Tooltip":"More information about {0}","BadgePage.Guidelines.Tooltip":"Guidelines","BadgePage.False.Option":"False","BadgePage.True.Option":"True","BadgePage.Direct.Option":"Direct","BadgePage.Full.Option":"Full","BadgePage.None.Option":"None","BadgePage.Dark.Option":"Dark","BadgePage.Light.Option":"Light","BadgePage.Off.Option":"Off","BadgePage.On.Option":"On","BadgePage.AutoDetect.Option":"Auto Detect","BadgePage.GenerateBadge":"Generate your badge","BadgePage.CopiedClipboard":"Copied to clipboard!","BadgePage.StaticBadge.Title":"Static badge","BadgePage.StaticBadge.SimpleDescription":"A simple, lightweight badge using a standard image and link.","BadgePage.StaticBadge.Description":"This badge is ideal for READMEs, documentation sites, environments with Content Security Policies, or anywhere external scripts are restricted.\u00A0","BadgePage.WebComponentBadge.Title":"Web component badge","BadgePage.WebComponentBadge.SimpleDescription":"A dynamic, interactive badge built as a web component.","BadgePage.WebComponentBadge.Description":"This badge is JavaScript-based and offers modern features including automatic locale and theme detection as well as a smooth hover animation. Choose this option when you want the best, most customized experience for your users.","BadgePage.GetStarted.Title":"Get started","BadgePage.GetStarted.Description":"Follow these steps to generate your badge and add it to your website.","BadgePage.GetStarted.Step1.Title":"Pick a badge type","BadgePage.GetStarted.Step1.Description":"Choose between a Web component or Static badge. If you\u0027re unsure, the static badge is a safe bet.","BadgePage.GetStarted.Step2.Title":"Enter your App ID","BadgePage.GetStarted.Step2.Description":"Paste your 12-character App ID (found in your Partner Center dashboard) into the textbox.","BadgePage.GetStarted.Step3.Title":"Select properties","BadgePage.GetStarted.Step3.Description":"Customize the language, theme, and launch targets, or add a campaign ID to track performance.","BadgePage.GetStarted.Step4.Title":"Copy the code","BadgePage.GetStarted.Step4.Description":"Click \u0022Generate your badge\u0022 and paste the snippet directly into your website\u0027s code.","BadgePage.Guidelines.Title":"Guidelines \u0026 best practices","BadgePage.Guidelines.Description":"Follow these best practices to maximize your conversion rates and maintain brand consistency.","BadgePage.Guidelines.KeepItClear.Title":"Keep it clear","BadgePage.Guidelines.KeepItClear.Description":"Maintain standard spacing around the badge. Don\u0027t crowd it with other text or graphics.","BadgePage.Guidelines.PlaceProminent.Title":"Place it prominently","BadgePage.Guidelines.PlaceProminent.Description":"For the best click-through rates, place the badge \u0022above the fold\u0022 on your homepage, or directly next to your app\u0027s primary features list.","BadgePage.Guidelines.DontAlter.Title":"Don\u0027t alter the artwork","BadgePage.Guidelines.DontAlter.Description":"Use the generated code directly. Do not stretch, recolor, or modify the badge graphics, as this violates the Microsoft Store brand guidelines.","BadgePage.Guidelines.CampaignId.Title":"Add a campaign ID to track performance","BadgePage.Guidelines.CampaignId.Description":"Appending a campaign ID allows you to track visitors and conversions, making it easy to experiment with different placements. After all, you can\u0027t improve what you don\u0027t measure!","BadgePage.Guidelines.DownloadLink":"Download full guidelines (PDF)","BadgePage.FAQ.Title":"FAQ","BadgePage.FAQ.FindAppId.Question":"Where can I find my 12-character App ID (Product ID)?","BadgePage.FAQ.FindAppId.Answer1":"Your App ID (also known as the Product ID) is a unique 12-character alphanumeric code assigned to your app. You can find it in your Windows Partner Center dashboard. Navigate to your app\u0027s page, select App management \u003E App identity, and look for the \u0022Store ID\u0022 value.","BadgePage.FAQ.FindAppId.Answer2":"Alternatively, you can find your app on apps.microsoft.com. Your App ID is the 12-character code at the end of the URL: apps.microsoft.com/detail/\u003CAppID\u003E.","BadgePage.FAQ.TrackDownloads.Question":"How do I track how many downloads are generated from my website?","BadgePage.FAQ.TrackDownloads.Answer":"You can track badge performance by adding a Campaign ID (cid) to your badge link. When generating your badge above, enter a custom campaign name (e.g., \u0022fooapp_website\u0022). You can then view the click-through rates and conversion data associated with that specific campaign in your Partner Center Acquisition Report.","BadgePage.FAQ.WhichBadgeType.Question":"Which badge type should I choose: Static or Web Component?","BadgePage.FAQ.WhichBadgeType.Answer1":"Choose the Web Component for the best user experience on modern websites. It automatically detects the user\u0027s system language, updates to match Microsoft\u0027s current design language, and provides smooth hover animations.","BadgePage.FAQ.WhichBadgeType.Answer2":"Choose the Static badge if your platform restricts JavaScript (like GitHub READMEs, WordPress without custom JS, or strict Content Security Policy environments).","BadgePage.FAQ.UpdateBadge.Question":"Do I need to update my badge if the Microsoft Store changes its branding?","BadgePage.FAQ.UpdateBadge.Answer":"If you are using the badges generated from this page, no. The assets are hosted by Microsoft and will automatically update your badge to reflect any future rebranding or design changes.","BadgePage.FAQ.ResizeBadge.Question":"Can I resize the badge to fit my website\u0027s design?","BadgePage.FAQ.ResizeBadge.Answer":"The Web Component badge is naturally responsive and will scale appropriately. If you are using the Static image, you can scale the image using CSS (e.g., adjusting the max-width), but you must preserve the original aspect ratio. Never stretch, skew, or crop the image.","BadgePage.FAQ.DarkMode.Question":"Does the badge support dark mode?","BadgePage.FAQ.DarkMode.Answer":"Yes. The Web Component badge can automatically detect the user\u0027s system theme or your website\u0027s CSS theme and display either a dark or light variant. You can also force it to always display in dark or light mode using the generator tools above.","BadgePage.SideNav.GetStarted":"Get started","BadgePage.SideNav.BuildYourBadge":"Build your badge","BadgePage.SideNav.StaticBadge":"Static badge","BadgePage.SideNav.WebComponentBadge":"Web component badge","BadgePage.SideNav.Guidelines":"Guidelines","BadgePage.SideNav.FAQ":"FAQ","Common.CollectionsTitle":"Collectio
