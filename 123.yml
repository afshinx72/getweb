name: Fetch URL Content

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to fetch with curl"
        required: true
        type: string

permissions:
  contents: write

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest

    steps:
      # 1. checkout repo
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 2. fetch raw HTML
      - name: Fetch URL content with curl
        run: |
          URL="${{ github.event.inputs.url }}"
          echo "Fetching: $URL"

          # نام فایل امن (اگر می‌خواهید همیشه یک فایل ثابت باشد، این خط را حذف کنید)
          FILE=$(echo "$URL" | sed -E 's/[^a-zA-Z0-9]/_/g').html

          # خروجی را در فایل ذخیره کنید
          curl -L --silent --fail "$URL" > "$FILE"
          echo "Saved to $FILE"

      # 3. commit & push
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Fetched content from $URL" || echo "No changes to commit"
          git push
